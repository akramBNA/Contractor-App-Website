<section id="activitiés" class="w-full min-h-screen bg-blue-900 text-yellow-500 flex flex-col items-center justify-center px-6 py-20 relative">

  <h2 class="text-4xl sm:text-5xl font-bold text-yellow-500 mb-16">Nos Activités</h2>

  <div class="relative w-full max-w-xl flex items-center justify-center">

    <button
      (click)="prevCard()"
      class="hidden lg:flex absolute -left-16 z-10 w-12 h-12 items-center justify-center bg-yellow-500 hover:bg-yellow-400 text-blue-900 text-xl font-bold rounded-full shadow-lg transition-all duration-200 cursor-pointer"
      aria-label="Previous">◀</button>

    <div class="carousel-container w-full h-[460px] bg-blue-950 rounded-3xl shadow-2xl overflow-hidden">
      <div class="carousel-track" [style.transform]="'translateX(-' + (activeIndex * 100) + '%)'">
        <div *ngFor="let card of cards" class="carousel-card">
          <img [src]="card.image" [alt]="card.title" class="w-32 h-32 object-contain"/>
          <h3 class="text-2xl font-semibold text-yellow-500">{{ card.title }}</h3>
          <p class="text-base text-white leading-relaxed max-w-xs">{{ card.description }}</p>
        </div>
      </div>
    </div>

    <button
      (click)="nextCard()"
      class="hidden lg:flex absolute -right-16 z-10 w-12 h-12 items-center justify-center bg-yellow-500 hover:bg-yellow-400 text-blue-900 text-xl font-bold rounded-full shadow-lg transition-all duration-200 cursor-pointer"
      aria-label="Next">▶</button>
  </div>

  <div class="flex gap-2 mt-10">
    <div
      *ngFor="let card of cards; let i = index"
      class="rounded-full transition-all duration-300 cursor-pointer"
      [ngClass]="{
        'w-6 h-2 bg-yellow-500': i === activeIndex,
        'w-2 h-2 bg-yellow-200 opacity-60': i !== activeIndex
      }"
      (click)="goToCard(i)">
    </div>
  </div>

</section>
